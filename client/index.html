<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Abyssal Assets - Cryptid Hat Trading Simulator" />
    <meta name="theme-color" content="#09090b" />
    <title>Abyssal Assets | The Loch Exchange</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #f43f5e;     /* Cyberpunk Red / Pink */
        --secondary: #0ea5e9;   /* Cyberpunk Blue */
        --accent: #8b5cf6;      /* Magic Purple */
        --bg: #030305;
        --surface: rgba(18, 18, 28, 0.6);
        --glow: rgba(244, 63, 94, 0.4);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        background: var(--bg); 
        overflow: hidden; 
        font-family: 'Outfit', sans-serif; 
        color: #fff;
      }
      
      /* Interactive Cyberpunk Background */
      .bg-grid {
        position: fixed;
        inset: -50%;
        background-image: 
          linear-gradient(rgba(14, 165, 233, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
        background-size: 50px 50px;
        transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
        animation: gridMove 20s linear infinite;
        z-index: 0;
      }
      @keyframes gridMove {
        0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
        100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
      }
      
      .bg-glow {
        position: fixed;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
        border-radius: 50%;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        filter: blur(100px);
        opacity: 0.5;
        z-index: 1;
        animation: pulseGlow 8s ease-in-out infinite alternate;
      }
      @keyframes pulseGlow {
        0% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
        100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; }
      }

      #game-container { width: 100vw; height: 100vh; display: block; position: relative; z-index: 10; }
      canvas { display: block; }
      
      /* Sovereign Loading Interface */
      #loading {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center, rgba(3,3,5,0.8) 0%, var(--bg) 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        backdrop-filter: blur(20px);
        transition: all 0.8s cubic-bezier(0.8, 0, 0.2, 1);
      }
      #loading.hidden { 
        opacity: 0; 
        pointer-events: none; 
        transform: scale(1.1);
      }
      
      /* Hyper-Premium Glassmorphic Card */
      .loader-card {
        position: relative;
        background: var(--surface);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 32px;
        padding: 5rem 4rem;
        text-align: center;
        box-shadow: 
          0 0 0 1px rgba(255, 255, 255, 0.05) inset,
          0 40px 80px -20px rgba(0, 0, 0, 0.8),
          0 0 40px rgba(244, 63, 94, 0.15);
        transform-style: preserve-3d;
        animation: float 6s ease-in-out infinite;
        overflow: hidden;
      }
      
      /* Card Edge Glow Effect */
      .loader-card::before {
        content: '';
        position: absolute;
        inset: -2px;
        border-radius: 34px;
        background: conic-gradient(from 0deg, transparent 0%, var(--primary) 25%, var(--secondary) 50%, var(--accent) 75%, transparent 100%);
        z-index: -1;
        animation: rotateGlow 4s linear infinite;
        opacity: 0.5;
      }
      .loader-card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: var(--surface);
        border-radius: 32px;
        z-index: -1;
      }
      @keyframes rotateGlow {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotateX(2deg); }
        50% { transform: translateY(-15px) rotateX(-2deg); }
      }

      .title-container {
        position: relative;
        margin-bottom: 1rem;
      }

      .lake-title { 
        font-family: 'Syncopate', sans-serif;
        font-size: 3.5rem; 
        font-weight: 700; 
        letter-spacing: 0.05em; 
        text-transform: uppercase;
        background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        position: relative;
        z-index: 2;
      }
      
      .title-glitch {
        position: absolute;
        top: 0; left: 0; width: 100%;
        font-family: 'Syncopate', sans-serif;
        font-size: 3.5rem; 
        font-weight: 700; 
        letter-spacing: 0.05em; 
        text-transform: uppercase;
        color: var(--primary);
        z-index: 1;
        opacity: 0.5;
        transform: translate(-3px, 2px);
        animation: glitchAnim 3s infinite;
      }

      @keyframes glitchAnim {
        0%, 100% { transform: translate(-3px, 2px); opacity: 0.5; }
        10% { transform: translate(3px, -2px); opacity: 0.8; }
        20% { transform: translate(-3px, 2px); opacity: 0.5; }
        80% { transform: translate(-3px, 2px); opacity: 0.5; }
        85% { transform: translate(4px, 0); opacity: 0.9; }
        90% { transform: translate(-3px, 2px); opacity: 0.5; }
      }

      .lake-subtitle { 
        font-family: 'JetBrains Mono', monospace; 
        font-size: 1rem; 
        font-weight: 800;
        color: var(--secondary);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 4rem; 
        position: relative;
        display: inline-block;
      }
      .lake-subtitle::before, .lake-subtitle::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 30px;
        height: 1px;
        background: var(--secondary);
        opacity: 0.5;
      }
      .lake-subtitle::before { left: -45px; }
      .lake-subtitle::after { right: -45px; }

      /* State-of-the-Art Progress Bar */
      .progress-wrapper {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        position: relative;
      }
      
      .progress-bar { 
        width: 100%; 
        height: 4px; 
        background: rgba(255, 255, 255, 0.05); 
        border-radius: 2px;
        overflow: hidden; 
        position: relative;
      }
      
      .progress-fill { 
        height: 100%; 
        background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary)); 
        background-size: 200% 200%;
        width: 0%; 
        border-radius: 2px;
        transition: width 0.4s cubic-bezier(0.1, 0, 0, 1); 
        animation: gradientFlow 2s ease infinite;
        position: relative;
      }
      
      /* Glowing dot at the end of progress */
      .progress-fill::after {
        content: '';
        position: absolute;
        right: 0; top: 50%;
        transform: translateY(-50%);
        width: 12px; height: 12px;
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 0 15px 5px var(--secondary);
      }

      @keyframes gradientFlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .loading-data {
        display: flex;
        justify-content: space-between;
        margin-top: 1rem;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.75rem;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .status-text {
        animation: pulseText 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .percentage-text {
        color: #fff;
        font-weight: 700;
        text-shadow: 0 0 10px var(--secondary);
      }

      @keyframes pulseText {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      
      /* Interactive cursor follower */
      #cursor-glow {
        position: fixed;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
        pointer-events: none;
        z-index: 5;
        transform: translate(-50%, -50%);
        transition: opacity 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div id="cursor-glow"></div>
    
    <div id="loading" role="status" aria-live="polite">
      <div class="loader-card">
        <div class="title-container">
          <div class="title-glitch">ABYSSAL ASSETS</div>
          <div class="lake-title">ABYSSAL ASSETS</div>
        </div>
        <div class="lake-subtitle">The Loch Exchange // MSN</div>
        <div class="progress-wrapper">
          <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="loading-data">
            <span class="status-text" id="loading-status">SYNCHRONIZING MSN ROUTER...</span>
            <span class="percentage-text" id="loading-pct">0%</span>
          </div>
        </div>
      </div>
    </div>
    
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Mouse follower effect
      document.addEventListener('mousemove', (e) => {
        const glow = document.getElementById('cursor-glow');
        if (glow) {
          glow.style.left = e.clientX + 'px';
          glow.style.top = e.clientY + 'px';
        }
      });
      
      // Simulate loading for the beautiful UI
      let pct = 0;
      const fill = document.getElementById('progress-fill');
      const pctText = document.getElementById('loading-pct');
      const statusText = document.getElementById('loading-status');
      const statuses = [
        "BOOTING LOCAL CEREBELLUM...",
        "CONNECTING TO CLOUD CORTEX...",
        "ENGAGING SEPHIROTIC ROUTING...",
        "ESTABLISHING LILITH PROTOCOL...",
        "INITIALIZING ABYSSAL ASSETS..."
      ];
      
      const loadInterval = setInterval(() => {
        pct += Math.random() * 5;
        if (pct >= 100) {
          pct = 100;
          clearInterval(loadInterval);
        }
        if (fill) fill.style.width = pct + '%';
        if (pctText) pctText.innerText = Math.floor(pct) + '%';
        if (statusText) statusText.innerText = statuses[Math.floor((pct/100) * (statuses.length - 1))];
      }, 150);
    </script>
  </body>
</html>
