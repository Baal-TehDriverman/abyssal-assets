MSNGraphicsDriverBridge:
  CyberpunkLaunchPolicy:
    fallbackSteamLaunch: gamemoderun mangohud %command%
    priorities:
    - Bind Cyberpunk to RTX 3060 with prime-run when Steam does not do it automatically.
    - Use MangoHud for frame-time and VRAM measurement.
    - Use GameMode to bias CPU/governor scheduling toward gameplay.
    - Keep local AI background work below the game-active NGD VRAM budget.
    recommendedSteamLaunch: prime-run gamemoderun mangohud %command%
  Guardrails:
  - Driver telemetry may fail inside sandbox; confirm host NVML before diagnosing
    driver failure.
  - No driver mutation, kernel module reload, or process injection from MSN without
    explicit operator approval.
  - Treat frame-time variance and VRAM headroom as primary success metrics.
  - Prefer measured DLSS/dynamic quality changes over blind maximum settings.
  HostGraphicsStack:
    discreteGpu:
      architecture: Ampere
      cudaUmdVersion: '13.3'
      device: GA106M GeForce RTX 3060 Laptop GPU / Max-Q
      driverVersion: 610.43.02
      gspFirmwareVersion: 610.43.02
      kernelDriver: nvidia
      kernelModules:
      - nvidia
      - nvidia_drm
      - nvidia_modeset
      - nvidia_uvm
      kmdVersion: 610.43.02
      maxGraphicsClockMHz: 2100
      maxMemoryClockMHz: 7001
      maxPowerLimitW: 130
      pciBusId: '00000000:01:00.0'
      pcie:
        deviceMaxGeneration: 4
        hostMaxGeneration: 3
        idleCurrentGeneration: 1
        idleCurrentWidth: 8x
        maxWidth: 16x
      powerLimitW: 115
      vbiosVersion: 94.06.17.00.31
      vendor: NVIDIA
      vramTotalMiB: 6144
    kernel: 7.0.12-zen1-1-zen
    os: Garuda Linux rolling
    primaryIgp:
      device: Cezanne Radeon Vega Mobile
      kernelDriver: amdgpu
      role: desktop/display efficiency path
      vendor: AMD
    sessionModel: hybrid laptop graphics
  InstalledDriverPackages:
    graphicsRuntime:
    - vulkan-tools 1.4.350.0-1
    - vulkan-icd-loader 1.4.350.0-1
    - dxvk-mingw-git 2.7.1
    - vkd3d 1.19
    - mangohud 0.8.4
    - gamemode 1.8.2
    - steam 1.0.0.85
    - wine-staging 11.11
    - Proton Experimental observed
    nvidia:
    - nvidia-open-dkms 610.43.02-2
    - nvidia-utils 610.43.02-2
    - lib32-nvidia-utils 610.43.02-1
    - opencl-nvidia 610.43.02-2
    - lib32-opencl-nvidia 610.43.02-1
    - nvidia-settings 610.43.02-1
    - nvidia-prime 1.0-6
    - garuda-hardware-profile-nvidia 2.0.1-3
  LiveTelemetryBaseline:
    activeProcesses:
    - Xorg
    - Proton wineserver / explorer.exe
    - REDlauncher.exe
    bar1UsedMiB: 133
    gpuTargetTemperatureC: 87
    gpuTemperatureC: 44
    gpuUtilizationPercent: 25
    memoryUtilizationPercent: 100
    performanceState: P8 idle
    powerDrawW: 10.0
    timestamp: '2026-06-17T16:14:15-05:00'
    vramFreeMiB: 5675
    vramReservedMiB: 341
    vramUsedMiB: 130
  MSNIntegration:
    commandSurfaces:
    - msn.graphics.status
    - msn.graphics.stack
    - msn.graphics.optimize
    - msn.ngd.status
    - ngd.telemetry
    cyberpunkConfig:
    - tweakdb/msn_graphics_driver_bridge.yaml
    - ngd_rnn_optimization.redmod.toml
    lilithAPI: http://localhost:3210/api/ngd/status
    ngdRoutePolicy: GAME_FIRST_LOCAL_CEREBELLUM
    telemetryFiles:
    - invite/runtime/nvidia_gratitude_driver/cyberpunk_3060_butter_profile.json
    - invite/runtime/nvidia_gratitude_driver/cyberpunk_3060_live_snapshot.json
    - invite/runtime/nvidia_gratitude_driver/status.json
    - invite/runtime/nvidia_gratitude_driver/telemetry.jsonl
  localOnly: true
  purpose: Bind current Linux/NVIDIA/AMD hybrid graphics state into MSN so Cyberpunk
    tuning, NGD routing, and Lilith telemetry share one driver truth.
  schema: msn.graphics_driver_bridge.v1

# Lilith Sovereign — unified by lilith_unify_cyberpunk.py
