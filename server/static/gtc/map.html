<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTC - Territorial Control Map</title>
    <style>
        body {
            background-color: #0d0d12;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            margin-top: 20px;
        }

        .map-container {
            position: relative;
            width: 800px;
            height: 600px;
            margin-top: 20px;
            background: #111;
            border: 2px solid #333;
            box-shadow: 0 0 20px #000;
            overflow: hidden;
        }

        .district {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.8;
            border-radius: 10px;
            border: 2px solid transparent;
        }

        .district:hover {
            opacity: 1;
            transform: scale(1.05);
            z-index: 10;
        }

        /* Watson - Neon Wraiths */
        #watson {
            top: 80px;
            left: 150px;
            width: 180px;
            height: 150px;
            background-color: rgba(255, 0, 255, 0.4);
            border-color: #ff00ff;
            box-shadow: 0 0 15px #ff00ff inset, 0 0 10px #ff00ff;
            color: #ffb3ff;
            clip-path: polygon(20% 0%, 100% 10%, 80% 100%, 0% 80%);
        }

        /* Westbrook - Chrome Legion */
        #westbrook {
            top: 170px;
            left: 450px;
            width: 220px;
            height: 180px;
            background-color: rgba(0, 255, 255, 0.4);
            border-color: #00ffff;
            box-shadow: 0 0 15px #00ffff inset, 0 0 10px #00ffff;
            color: #b3ffff;
            clip-path: polygon(0% 20%, 80% 0%, 100% 80%, 20% 100%);
        }

        /* City Center - Synth Syndicate */
        #city-center {
            top: 350px;
            left: 220px;
            width: 200px;
            height: 160px;
            background-color: rgba(255, 255, 0, 0.4);
            border-color: #ffff00;
            box-shadow: 0 0 15px #ffff00 inset, 0 0 10px #ffff00;
            color: #ffffb3;
            clip-path: polygon(30% 0%, 100% 20%, 70% 100%, 0% 80%);
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #444;
            border-radius: 5px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .color-box {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }

        .wraiths { background-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
        .legion { background-color: #00ffff; box-shadow: 0 0 10px #00ffff; }
        .syndicate { background-color: #ffff00; box-shadow: 0 0 10px #ffff00; }

        .ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 250px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #333;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            display: none;
            z-index: 200;
        }

        .ui-panel h3 {
            margin-top: 0;
            color: #fff;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .value {
            font-weight: bold;
        }

        .btn-close {
            background: none;
            border: 1px solid #ff0055;
            color: #ff0055;
            padding: 5px 10px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-close:hover {
            background: #ff0055;
            color: #fff;
            box-shadow: 0 0 10px #ff0055;
        }
        
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        /* Scanline effect */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <h1>NIGHT CITY TERRITORIAL CONTROL</h1>

    <div class="map-container" id="map">
        <div class="grid-overlay"></div>
        
        <!-- Districts -->
        <div class="district" id="watson" onclick="showStats('Watson', 'Neon Wraiths', '85%', 'Low', '#ff00ff')">
            Watson
        </div>
        
        <div class="district" id="westbrook" onclick="showStats('Westbrook', 'Chrome Legion', '92%', 'High', '#00ffff')">
            Westbrook
        </div>
        
        <div class="district" id="city-center" onclick="showStats('City Center', 'Synth Syndicate', '78%', 'Extreme', '#ffff00')">
            City Center
        </div>

        <div class="scanlines"></div>
        
        <!-- UI Panel -->
        <div class="ui-panel" id="infoPanel">
            <h3 id="panelTitle">District Info</h3>
            <div class="stat-row">
                <span>Controlling Gang:</span>
                <span class="value" id="panelGang">--</span>
            </div>
            <div class="stat-row">
                <span>Control Level:</span>
                <span class="value" id="panelControl">--</span>
            </div>
            <div class="stat-row">
                <span>Hostility:</span>
                <span class="value" id="panelHostility">--</span>
            </div>
            <button class="btn-close" onclick="closeStats()">CLOSE</button>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="color-box wraiths"></div>
            <span>Neon Wraiths</span>
        </div>
        <div class="legend-item">
            <div class="color-box legion"></div>
            <span>Chrome Legion</span>
        </div>
        <div class="legend-item">
            <div class="color-box syndicate"></div>
            <span>Synth Syndicate</span>
        </div>
    </div>

    <script>
        function showStats(district, gang, control, hostility, color) {
            const panel = document.getElementById('infoPanel');
            document.getElementById('panelTitle').innerText = district;
            document.getElementById('panelTitle').style.color = color;
            document.getElementById('panelTitle').style.textShadow = `0 0 5px ${color}`;
            
            const gangEl = document.getElementById('panelGang');
            gangEl.innerText = gang;
            gangEl.style.color = color;
            
            document.getElementById('panelControl').innerText = control;
            document.getElementById('panelHostility').innerText = hostility;
            
            panel.style.display = 'block';
            panel.style.boxShadow = `0 0 15px ${color}`;
            panel.style.borderColor = color;
        }

        function closeStats() {
            document.getElementById('infoPanel').style.display = 'none';
        }
    </script>
</body>
</html>
