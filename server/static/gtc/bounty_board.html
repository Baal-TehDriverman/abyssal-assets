<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syndicate Bounty Board</title>
    <style>
        :root {
            --neon-green: #0f0;
            --dark-bg: #050505;
            --grid-color: #002200;
        }
        
        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--neon-green);
            padding-bottom: 10px;
            text-shadow: 0 0 10px var(--neon-green);
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 5px;
        }

        #bounty-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .bounty-card {
            border: 1px solid var(--neon-green);
            padding: 15px;
            background-color: rgba(0, 20, 0, 0.8);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .bounty-card:hover {
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.5);
            transform: scale(1.02);
            z-index: 10;
        }

        .bounty-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: var(--neon-green);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .bounty-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed var(--neon-green);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .bounty-id {
            font-weight: bold;
        }

        .status {
            padding: 2px 8px;
            border: 1px solid var(--neon-green);
            font-size: 0.8em;
            animation: blink 2s infinite;
        }

        .status.open { color: var(--neon-green); }
        .status.in-progress { color: #ff0; border-color: #ff0; animation: none;}
        .status.closed { color: #f00; border-color: #f00; text-decoration: line-through; animation: none;}

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.5; }
        }

        .target-name {
            font-size: 1.5em;
            margin: 10px 0;
            text-transform: uppercase;
        }

        .syndicate {
            color: #8f8;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .reward {
            font-size: 1.2em;
            font-weight: bold;
            margin: 15px 0;
            text-shadow: 0 0 5px var(--neon-green);
        }

        .details {
            font-size: 0.9em;
            line-height: 1.4;
            opacity: 0.8;
        }

        #loading {
            text-align: center;
            font-size: 1.5em;
            animation: blink 1s infinite;
        }
        
        .glitch {
            position: relative;
        }
        
        /* Add some static noise overlay */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.05;
            z-index: 999;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

    </style>
</head>
<body>
    <div class="noise"></div>
    <header>
        <h1 class="glitch" data-text="SYNDICATE BOUNTY BOARD">SYNDICATE BOUNTY BOARD</h1>
        <p>SECURE NETWORK CONNECTION ESTABLISHED // AUTHORIZED ACCESS ONLY</p>
    </header>

    <div id="loading">FETCHING SECURE DATA...</div>
    <div id="bounty-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('bounty-container');
            const loading = document.getElementById('loading');

            // Simulate network delay for effect
            setTimeout(() => {
                fetch('bounties.json')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Network response was not ok');
                        }
                        return response.json();
                    })
                    .then(data => {
                        loading.style.display = 'none';
                        data.forEach(bounty => {
                            const card = document.createElement('div');
                            card.className = 'bounty-card';
                            
                            const statusClass = bounty.status.toLowerCase().replace(' ', '-');

                            card.innerHTML = `
                                <div class="bounty-header">
                                    <span class="bounty-id">[ ${bounty.id} ]</span>
                                    <span class="status ${statusClass}">${bounty.status}</span>
                                </div>
                                <div class="target-name">> ${bounty.target}</div>
                                <div class="syndicate">ISSUER: ${bounty.syndicate}</div>
                                <div class="reward">REWARD: ${bounty.reward}</div>
                                <div class="details">${bounty.details}</div>
                            `;
                            
                            container.appendChild(card);
                        });
                    })
                    .catch(error => {
                        loading.textContent = 'ERROR: FAILED TO FETCH BOUNTY DATA. CONNECTION INTERCEPTED.';
                        loading.style.color = 'red';
                        console.error('Error fetching bounties:', error);
                    });
            }, 1500); // 1.5 second artificial delay
        });
    </script>
</body>
</html>
