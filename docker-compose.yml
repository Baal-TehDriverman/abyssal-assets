version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: abyssal-postgres
    environment:
      POSTGRES_USER: abyssal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abyssal_assets_2024}
      POSTGRES_DB: abyssal_assets
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abyssal -d abyssal_assets"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: abyssal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: abyssal-backend
    environment:
      DATABASE_URL: postgresql://abyssal:${POSTGRES_PASSWORD:-abyssal_assets_2024}@postgres:5432/abyssal_assets
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-abyssal_assets_secret_key_2024_change_in_production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend Dev Server
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: abyssal-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: abyssal-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: abyssal-network